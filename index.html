<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0A0A0F">
<title>ThinkFlow</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/app.css">
</head>
<body>
<div class="ambient"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>
<div class="toast" id="toast"></div>

<!-- AUTH -->
<div class="screen active" id="authScreen">
  <svg class="auth-logo" viewBox="0 0 88 88" fill="none"><defs><linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#7C6AFF"/><stop offset="50%" stop-color="#9B8AFF"/><stop offset="100%" stop-color="#FF7A5C"/></linearGradient></defs><circle cx="44" cy="44" r="42" stroke="url(#logoGrad)" stroke-width="2.5" fill="none" opacity="0.3"/><path d="M26 52C26 36,36 24,44 24C52 24,58 32,58 40C58 48,52 52,44 52C36 52,30 56,30 62" stroke="url(#logoGrad)" stroke-width="3" fill="none" stroke-linecap="round"/><path d="M44 52C52 52,60 56,60 62" stroke="url(#logoGrad)" stroke-width="3" fill="none" stroke-linecap="round"/><circle cx="44" cy="24" r="4" fill="#7C6AFF"/><circle cx="30" cy="62" r="3.5" fill="#FF7A5C"/><circle cx="60" cy="62" r="3.5" fill="#9B8AFF"/><circle cx="58" cy="40" r="3" fill="#5CFFC4" opacity="0.8"/></svg>
  <div class="auth-title">ThinkFlow</div>
  <div class="auth-sub" data-i18n="auth_sub"></div>
  <div class="auth-form">
    <div class="input-group"><input type="text" id="authUser" data-i18n-ph="auth_user_ph" autocomplete="username"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="8" r="4.5"/><path d="M4 21c0-4.4 3.6-8 8-8s8 3.6 8 8"/></svg></div>
    <div class="input-group"><input type="password" id="authPass" data-i18n-ph="auth_pass_ph" autocomplete="current-password"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="5" y="11" width="14" height="10" rx="2.5"/><path d="M8 11V7a4 4 0 018 0v4"/><circle cx="12" cy="16.5" r="1.5" fill="currentColor"/></svg></div>
    <div class="input-group" id="apiKeyGroup" style="display:none"><input type="password" id="authApiKey" placeholder="Anthropic API" autocomplete="off"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div>
    <button class="btn-primary" id="authBtn" onclick="App.handleAuth()" data-i18n="auth_btn"></button>
    <button class="btn-secondary" id="biometricBtn" onclick="App.biometricAuth()" style="display:none"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 16a4 4 0 004-4 4 4 0 00-8 0 4 4 0 004 4z"/><path d="M6 12a6 6 0 0112 0"/><path d="M4 12a8 8 0 0116 0"/><path d="M12 16v3"/></svg> Face ID</button>
    <div class="auth-toggle" id="authToggle"></div>
  </div>
</div>

<!-- MAIN -->
<div class="screen" id="mainScreen">
  <div class="top-bar">
    <div class="top-bar-left"><svg class="top-bar-logo" viewBox="0 0 36 36" fill="none"><circle cx="18" cy="18" r="17" stroke="#7C6AFF" stroke-width="1.5" opacity="0.4"/><path d="M11 22C11 15,15 10,18 10C21 10,24 14,24 17C24 20,21 22,18 22C15 22,13 24,13 26" stroke="#7C6AFF" stroke-width="2" fill="none" stroke-linecap="round"/><circle cx="18" cy="10" r="2.5" fill="#7C6AFF"/><circle cx="13" cy="26" r="2" fill="#FF7A5C"/></svg><div class="top-bar-title">ThinkFlow</div></div>
    <div class="top-bar-right">
      <button class="icon-btn" onclick="App.showScreen('analyticsScreen')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M18 20V10M12 20V4M6 20v-6"/></svg></button>
      <button class="icon-btn" onclick="App.showScreen('historyScreen')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg></button>
      <button class="icon-btn" onclick="App.showScreen('settingsScreen')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3m0 14v3M4.22 4.22l2.12 2.12m11.32 11.32l2.12 2.12M2 12h3m14 0h3M4.22 19.78l2.12-2.12m11.32-11.32l2.12-2.12"/></svg></button>
    </div>
  </div>
  <div class="streak-bar" id="streakBar"><div class="streak-icon">&#x1F525;</div><span class="streak-num" id="streakCount">0</span><span class="streak-text" data-i18n="streak_days"></span><div class="streak-dots" id="streakDots"></div></div>
  <div class="greeting"><div class="greeting-hello" id="greetingTime"></div><div class="greeting-msg" id="greetingMsg"></div></div>
  <div class="templates-section"><div class="section-label-sm" data-i18n="tpl_title"></div><div class="tpl-scroll" id="tplScroll"></div></div>
  <div class="voice-section">
    <div class="voice-label"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2a3.5 3.5 0 00-3.5 3.5v5a3.5 3.5 0 007 0v-5A3.5 3.5 0 0012 2z"/><path d="M19 10.5a7 7 0 01-14 0"/><path d="M12 17.5V21"/></svg><span data-i18n="voice_label"></span></div>
    <div class="voice-btn-wrap"><button class="voice-btn" id="voiceBtn" ontouchstart="App.startRec(event)" ontouchend="App.stopRec(event)" onmousedown="App.startRec(event)" onmouseup="App.stopRec(event)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2a3.5 3.5 0 00-3.5 3.5v5a3.5 3.5 0 007 0v-5A3.5 3.5 0 0012 2z"/><path d="M19 10.5a7 7 0 01-14 0"/><path d="M12 17.5V21"/></svg></button><div class="voice-ring"></div></div>
    <div class="wave-container" id="waveContainer"><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div></div>
    <div class="voice-hint" id="voiceHint" data-i18n="voice_hint"></div>
    <div class="voice-time" id="voiceTime">00:00</div>
  </div>
  <div class="think-input-section">
    <textarea class="think-textarea" id="thinkInput" data-i18n-ph="think_ph"></textarea>
    <button class="generate-btn" id="generateBtn" onclick="App.generate()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg><span data-i18n="gen_btn"></span></button>
  </div>
  <div class="plan-output" id="planOutput">
    <div class="plan-header">
      <div class="plan-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg></div>
      <div class="plan-title" id="planTitle"></div>
      <div class="plan-acts">
        <button class="icon-btn-sm" onclick="App.exportPlan()" title="Export"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>
        <button class="icon-btn-sm" onclick="App.sharePlan()" title="Share"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg></button>
      </div>
    </div>
    <div class="plan-progress"><div class="plan-progress-bar"><div class="plan-progress-fill" id="progressFill"></div></div><span class="plan-progress-txt" id="progressTxt"></span></div>
    <div class="plan-time" id="planTime"></div>
    <div id="planSteps"></div>
  </div>
  <div class="improve-section" id="improveSection">
    <div class="improve-label"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 21 12 17.27 5.82 21 7 14.14l-5-4.87 6.91-1.01z"/></svg><span data-i18n="improve_label"></span></div>
    <textarea class="improve-textarea" id="improveFeedback" data-i18n-ph="improve_ph"></textarea>
    <button class="improve-btn" id="improveBtn" onclick="App.improve()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M23 4l-6 6m0-6l6 6M1 20l6-6m0 6l-6-6M12 2v4m0 12v4M2 12h4m12 0h4"/></svg><span data-i18n="improve_btn"></span></button>
  </div>
</div>

<!-- DRILL-DOWN -->
<div class="screen" id="drillScreen">
  <div class="top-bar"><div class="top-bar-left"><button class="back-btn" onclick="App.showScreen('mainScreen')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg></button><div class="top-bar-title" id="drillTitle"></div></div></div>
  <div class="drill-card" id="drillCard"></div>
  <div class="drill-chat" id="drillChat"></div>
  <div class="drill-bar"><input type="text" class="drill-input" id="drillInput" data-i18n-ph="drill_ph" onkeydown="if(event.key==='Enter')App.drillAsk()"><button class="drill-send" onclick="App.drillAsk()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9"/></svg></button></div>
</div>

<!-- HISTORY -->
<div class="screen" id="historyScreen">
  <div class="top-bar"><div class="top-bar-left"><button class="back-btn" onclick="App.showScreen('mainScreen')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg></button><div class="top-bar-title" data-i18n="hist_title"></div></div></div>
  <div class="search-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg><input type="text" id="histSearch" data-i18n-ph="hist_search_ph" oninput="App.filterHist()"></div>
  <div id="histList"></div>
  <div class="empty-state" id="histEmpty" style="display:none"><div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg></div><div data-i18n="hist_empty"></div></div>
</div>

<!-- ANALYTICS -->
<div class="screen" id="analyticsScreen">
  <div class="top-bar"><div class="top-bar-left"><button class="back-btn" onclick="App.showScreen('mainScreen')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg></button><div class="top-bar-title" data-i18n="an_title"></div></div></div>
  <div id="anContent"></div>
</div>

<!-- SETTINGS -->
<div class="screen" id="settingsScreen">
  <div class="top-bar"><div class="top-bar-left"><button class="back-btn" onclick="App.showScreen('mainScreen')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg></button><div class="top-bar-title" data-i18n="set_title"></div></div></div>
  <div class="settings-group"><div class="settings-group-label" data-i18n="set_account"></div><div class="settings-card"><div class="settings-item"><div class="si-icon" style="background:rgba(124,106,255,0.12)"><svg viewBox="0 0 24 24" fill="none" stroke="#7C6AFF" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="8" r="4.5"/><path d="M4 21c0-4.4 3.6-8 8-8s8 3.6 8 8"/></svg></div><div class="si-info"><div class="si-title" id="setUser">—</div><div class="si-desc" data-i18n="set_profile"></div></div></div></div></div>
  <div class="settings-group"><div class="settings-group-label" data-i18n="set_lang"></div><div class="settings-card"><div class="lang-sel"><button class="lang-btn active" data-lang="ru" onclick="App.setLang('ru')">Русский</button><button class="lang-btn" data-lang="en" onclick="App.setLang('en')">English</button><button class="lang-btn" data-lang="uz" onclick="App.setLang('uz')">O'zbek</button></div></div></div>
  <div class="settings-group"><div class="settings-group-label">API</div><div class="settings-card"><div class="settings-item"><div class="si-icon" style="background:rgba(92,255,196,0.1)"><svg viewBox="0 0 24 24" fill="none" stroke="#5CFFC4" stroke-width="1.8" stroke-linecap="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div><div class="si-info"><div class="si-title">Anthropic API Key</div><div class="si-desc">Claude Haiku 4.5</div></div></div><div class="api-wrap"><input type="password" class="api-input" id="setApiKey" placeholder="sk-ant-..." onchange="App.saveKey()"></div></div></div>
  <div class="settings-group"><div class="settings-group-label" data-i18n="set_data"></div><div class="settings-card"><div class="settings-item clickable" onclick="App.exportAll()"><div class="si-icon" style="background:rgba(255,190,92,0.1)"><svg viewBox="0 0 24 24" fill="none" stroke="#FFBE5C" stroke-width="1.8" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></div><div class="si-info"><div class="si-title" data-i18n="set_export"></div><div class="si-desc">JSON</div></div></div><div class="settings-item clickable" onclick="App.clearAll()"><div class="si-icon" style="background:rgba(255,92,138,0.1)"><svg viewBox="0 0 24 24" fill="none" stroke="#FF5C8A" stroke-width="1.8" stroke-linecap="round"><polyline points="3,6 5,6 21,6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg></div><div class="si-info"><div class="si-title" data-i18n="set_clear"></div><div class="si-desc" data-i18n="set_clear_d"></div></div></div></div></div>
  <button class="logout-btn" onclick="App.logout()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg><span data-i18n="logout"></span></button>
</div>

<script src="js/app.js"></script>
</body>
</html>
